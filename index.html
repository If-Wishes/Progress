<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPanel | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .role-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
        }
        .role-card.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        .hidden-panel {
            display: none;
        }
    </style>
</head>
<body class="login-container min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
    <div class="text-center mb-8">
        <div class="h-14 w-14 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg">
            <i class="fas fa-chart-line text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Nexus<span class="text-indigo-600">Panel</span></h1>
        <p class="text-gray-500 text-sm mt-1">Access your dashboard</p>
    </div>

    <!-- Role Selection -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div id="adminRoleCard" class="role-card border-2 border-gray-200 rounded-xl p-4 text-center hover:border-indigo-400 transition">
            <i class="fas fa-shield-alt text-3xl text-gray-400"></i>
            <p class="font-semibold mt-2 text-gray-700">Admin</p>
            <p class="text-xs text-gray-400">System management</p>
        </div>
        <div id="userRoleCard" class="role-card border-2 border-gray-200 rounded-xl p-4 text-center hover:border-emerald-400 transition">
            <i class="fas fa-user-circle text-3xl text-gray-400"></i>
            <p class="font-semibold mt-2 text-gray-700">User</p>
            <p class="text-xs text-gray-400">Personal dashboard</p>
        </div>
    </div>

    <!-- Admin Login Form -->
    <div id="adminLoginForm" class="login-panel">
        <form id="adminLogin">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2 text-gray-400"></i>Username or Email
                </label>
                <input type="text" id="adminUsername" required 
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-key mr-2 text-gray-400"></i>Password
                </label>
                <input type="password" id="adminPassword" required 
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-medium py-3 rounded-xl transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login as Admin
            </button>
        </form>
    </div>

    <!-- User Login Form -->
    <div id="userLoginForm" class="login-panel hidden-panel">
        <form id="userLogin">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2 text-gray-400"></i>Username or Email
                </label>
                <input type="text" id="userUsername" required 
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-300">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-key mr-2 text-gray-400"></i>Password
                </label>
                <input type="password" id="userPassword" required 
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-300">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-medium py-3 rounded-xl transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login as User
            </button>
        </form>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-400">
            <i class="fas fa-info-circle mr-1"></i> 
            Admin: <span class="font-mono bg-gray-100 px-2 py-1 rounded">admin</span> / <span class="font-mono bg-gray-100 px-2 py-1 rounded">admin123</span>
        </p>
        <p class="text-xs text-gray-400 mt-1">
            User: <span class="font-mono bg-gray-100 px-2 py-1 rounded">emily_chen</span> / <span class="font-mono bg-gray-100 px-2 py-1 rounded">password123</span>
        </p>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
    // Role selection toggle
    const adminCard = document.getElementById('adminRoleCard');
    const userCard = document.getElementById('userRoleCard');
    const adminPanel = document.getElementById('adminLoginForm');
    const userPanel = document.getElementById('userLoginForm');
    
    let selectedRole = 'admin';
    
    adminCard.addEventListener('click', () => {
        selectedRole = 'admin';
        adminCard.classList.add('active');
        userCard.classList.remove('active');
        adminPanel.classList.remove('hidden-panel');
        userPanel.classList.add('hidden-panel');
    });
    
    userCard.addEventListener('click', () => {
        selectedRole = 'user';
        userCard.classList.add('active');
        adminCard.classList.remove('active');
        userPanel.classList.remove('hidden-panel');
        adminPanel.classList.add('hidden-panel');
    });
    
    // Admin login
    document.getElementById('adminLogin').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;
        
        const result = adminLogin(username, password);
        if (result.success) {
            window.location.href = 'admin/dashboard.html';
        } else {
            alert('Invalid admin credentials');
        }
    });
    
    // User login
    document.getElementById('userLogin').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('userUsername').value;
        const password = document.getElementById('userPassword').value;
        
        const result = userLogin(username, password);
        if (result.success) {
            window.location.href = 'user/dashboard.html';
        } else {
            alert('Invalid user credentials');
        }
    });
    
    // Check if already logged in
    if (isAdminLoggedIn()) {
        window.location.href = 'admin/dashboard.html';
    } else if (isUserLoggedIn()) {
        window.location.href = 'user/dashboard.html';
    }
</script>
</body>
</html>
