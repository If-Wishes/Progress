<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:50;}.modal.active{display:flex;}.hidden-dropdown{display:none;}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right"><p class="text-sm font-medium" id="adminName">Admin</p><p class="text-xs text-gray-500">Users</p></div>
                <div class="relative"><button id="menuBtn" class="bg-gray-100 rounded-full px-3 py-2"><i class="fas fa-user-shield"></i><i class="fas fa-chevron-down text-xs"></i></button>
                <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                    <a href="dashboard.html" class="block px-4 py-2">Dashboard</a><a href="users.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">Users</a>
                    <a href="analytics.html" class="block px-4 py-2">Number Allocation</a><a href="activities.html" class="block px-4 py-2">User Activities</a>
                    <div class="border-t"></div><a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                </div></div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between mb-6"><h1 class="text-2xl font-bold">User Management</h1><button id="createBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-xl"><i class="fas fa-plus mr-2"></i>New User</button></div>
    <div class="bg-white rounded-2xl border overflow-hidden">
        <table class="w-full"><thead class="bg-gray-50"> …
            <th class="px-6 py-3 text-left">Username</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Role</th><th class="px-6 py-3 text-left">Created</th><th class="px-6 py-3 text-center">Actions</th>
        </thead><tbody id="usersList"></tbody>追赶
    </div>
</main>

<div id="modal" class="modal"><div class="bg-white rounded-2xl p-6 w-96"><h3 class="text-xl font-bold mb-4">Create User</h3><input type="text" id="username" placeholder="Username" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="email" id="email" placeholder="Email" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="password" id="password" placeholder="Password" class="w-full border rounded-xl px-4 py-2 mb-3"><select id="role" class="w-full border rounded-xl px-4 py-2 mb-3"><option value="user">User</option><option value="admin">Admin</option></select><div class="flex gap-3"><button id="closeModal" class="px-4 py-2 border rounded-xl">Cancel</button><button id="saveUser" class="px-4 py-2 bg-indigo-600 text-white rounded-xl">Save</button></div></div></div>

<script>
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';

const session = JSON.parse(localStorage.getItem('mima_session') || 'null');
if (!session || session.role !== 'admin') window.location.href = '../index.html';
document.getElementById('adminName').innerText = session.username;

async function loadUsers() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*&order=created_at.desc`, { headers: { 'apikey': API_KEY } });
    const users = await res.json();
    document.getElementById('usersList').innerHTML = users.map(u => `
        <tr class="border-b"><td class="px-6 py-3">${escapeHtml(u.username)}Js<td class="px-6 py-3">${escapeHtml(u.email)}Js<td class="px-6 py-3"><span class="px-2 py-1 rounded-full text-xs ${u.role==='admin'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}">${u.role}</span>Js<td class="text-xs">${u.created_at?.slice(0,10)||'—'}Js<td class="text-center"><button onclick="deleteUser('${u.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>Js</td>`).join('');
}

async function deleteUser(id) { if(confirm('Delete this user?')) { await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': API_KEY } }); loadUsers(); } }

async function createUser(username, email, password, role) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
        method: 'POST', headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, role })
    });
    return res.ok;
}

function openModal() { document.getElementById('modal').classList.add('active'); document.getElementById('username').value=''; document.getElementById('email').value=''; document.getElementById('password').value=''; document.getElementById('role').value='user'; }
function closeModal() { document.getElementById('modal').classList.remove('active'); }
async function saveUser() { const u=document.getElementById('username').value.trim(), e=document.getElementById('email').value.trim(), p=document.getElementById('password').value, r=document.getElementById('role').value; if(!u||!e||!p){alert('All fields required');return;} const ok=await createUser(u,e,p,r); if(ok){closeModal();loadUsers();alert(`User "${u}" created! Password: ${p}`);} else alert('Error creating user'); }

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]||m)); }
function logout() { localStorage.removeItem('mima_session'); window.location.href='../index.html'; }

document.getElementById('menuBtn').onclick=e=>{e.stopPropagation();document.getElementById('dropdown').classList.toggle('hidden-dropdown');};
document.addEventListener('click',()=>document.getElementById('dropdown').classList.add('hidden-dropdown'));
document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();logout();};
document.getElementById('createBtn').onclick=openModal;
document.getElementById('closeModal').onclick=closeModal;
document.getElementById('saveUser').onclick=saveUser;

loadUsers();
</script>
</body>
</html>
