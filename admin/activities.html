<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE ADMIN | User Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); min-height: 100vh; }
        .hidden-dropdown { display: none !important; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #7c3aed;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -12px rgba(124, 58, 237, 0.25); }
        .user-select { border: 2px solid #e5e7eb; transition: all 0.3s; }
        .user-select:focus { border-color: #7c3aed; outline: none; ring: 2px solid #c4b5fd; }
        .table-container { overflow-x: auto; max-height: 550px; overflow-y: auto; }
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .table-container::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 10px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #7c3aed; }
        .nav-link { transition: all 0.2s; display: block; width: 100%; text-align: left; }
        .nav-link:hover { background-color: #f5f3ff; color: #7c3aed; }
        .btn-primary-purple { background: #7c3aed; transition: all 0.2s ease; }
        .btn-primary-purple:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }
        .stat-card-purple-1 { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        .stat-card-purple-2 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .stat-card-purple-3 { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .stat-card-purple-4 { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
        
        .otp-entry {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid #e9d5ff;
            transition: all 0.2s;
        }
        .otp-entry:hover {
            border-color: #7c3aed;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1);
        }
        .otp-badge {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .dropdown-enter {
            animation: dropdownFade 0.2s ease;
        }
        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-md border-b border-purple-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <div class="h-8 w-8 rounded-lg bg-gradient-to-br from-purple-600 to-purple-800 flex items-center justify-center shadow-md">
                    <i class="fas fa-crown text-white text-sm"></i>
                </div>
                <span class="ml-2 text-xl font-bold text-gray-800">ELIT<span class="text-purple-600">Admin</span></span>
                <span class="ml-3 text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded-full font-medium">Admin Panel</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium text-gray-800" id="adminName">Administrator</p>
                    <p class="text-xs text-gray-500">User Activities</p>
                </div>
                <div class="relative">
                    <button id="menuButton" class="flex items-center gap-2 bg-gray-100 hover:bg-purple-50 rounded-full px-3 py-2 transition cursor-pointer">
                        <i class="fas fa-user-circle text-purple-600 text-lg"></i>
                        <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
                    </button>
                    <div id="dropdownMenu" class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-100 hidden-dropdown z-50 overflow-hidden dropdown-enter">
                        <a href="dashboard.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-tachometer-alt w-5 text-purple-500 mr-2"></i> Dashboard</a>
                        <a href="users.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-users w-5 text-purple-500 mr-2"></i> Users</a>
                        <a href="analytics.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-phone-alt w-5 text-purple-500 mr-2"></i> Numbers Allocation</a>
                        <a href="activities.html" class="nav-link px-4 py-2.5 bg-purple-50 text-purple-700 font-medium"><i class="fas fa-clipboard-list w-5 text-purple-500 mr-2"></i> User Activities</a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <a href="#" id="logoutBtn" class="nav-link px-4 py-2.5 text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="dashboardContent">
        <div class="bg-white rounded-2xl shadow-sm border border-purple-100 p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-2">👤 Select User</label>
                    <select id="userSelect" class="user-select w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none transition">
                        <option value="">-- Select a User --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">📅 Start Date</label>
                    <input type="date" id="startDate" class="w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">📅 End Date</label>
                    <input type="date" id="endDate" class="w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div class="flex items-end">
                    <button id="applyFilterBtn" class="btn-primary-purple w-full text-white px-4 py-2.5 rounded-xl transition shadow-sm">
                        <i class="fas fa-filter mr-2"></i>Apply Filter
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="stat-card stat-card-purple-1 rounded-2xl shadow-lg p-6 text-white">
                <p class="text-purple-100 text-sm font-medium">Total OTPs</p>
                <p class="text-3xl font-bold mt-1" id="totalOtps">0</p>
                <p class="text-purple-100 text-xs mt-1">(All OTPs count)</p>
            </div>
            <div class="stat-card stat-card-purple-2 rounded-2xl shadow-lg p-6 text-white">
                <p class="text-amber-100 text-sm font-medium">Total Earnings</p>
                <p class="text-3xl font-bold mt-1" id="totalEarnings">$0.00</p>
                <p class="text-amber-100 text-xs mt-1">($0.005 per OTP)</p>
            </div>
            <div class="stat-card stat-card-purple-3 rounded-2xl shadow-lg p-6 text-white">
                <p class="text-blue-100 text-sm font-medium">Unique Numbers</p>
                <p class="text-3xl font-bold mt-1" id="uniqueNumbers">0</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-purple-100 overflow-hidden">
            <div class="p-4 border-b border-purple-100 bg-gradient-to-r from-purple-50 to-white flex justify-between items-center">
                <h3 class="font-semibold text-gray-800"><i class="fas fa-list mr-2 text-purple-500"></i>OTP Records</h3>
                <div class="text-sm text-gray-500">
                    <i class="fas fa-info-circle mr-1 text-purple-400"></i> All OTPs count (no daily limits)
                </div>
            </div>
            <div id="otpRecordsList" class="p-4 space-y-3 max-h-[600px] overflow-y-auto">
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-user-circle text-4xl mb-3 opacity-40"></i><br/>
                    Select a user to view OTPs
                </div>
            </div>
        </div>
    </div>
</main>

<script>
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';

let allUsers = [];
let selectedUserId = null;
let startDate = '';
let endDate = '';
let userNumbers = [];
let userOtps = [];
let userPhoneLast3s = [];
let userNumberMap = new Map();

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function maskPhoneNumber(phoneNumber) {
    if (!phoneNumber) return '***';
    const digits = phoneNumber.toString().replace(/\D/g, '');
    if (digits.length <= 6) return '***' + digits.slice(-3);
    const start = digits.slice(0, 2);
    const end = digits.slice(-3);
    const middleLength = Math.min(7, digits.length - 5);
    const middle = '•'.repeat(middleLength);
    return start + middle + end;
}

function getLast3Digits(phoneNumber) {
    const digits = phoneNumber.toString().replace(/\D/g, '');
    if (digits.length >= 3) return digits.slice(-3);
    return digits;
}

function formatTime(messageTime) {
    if (messageTime) {
        const d = new Date(messageTime);
        if (!isNaN(d.getTime())) return d.toLocaleTimeString();
    }
    return '-';
}

async function fetchAllUsers() {
    try {
        const url = `${SUPABASE_URL}/rest/v1/users?select=id,username,email,role&order=username.asc`;
        const response = await fetch(url, { headers: { 'apikey': SUPABASE_API_KEY } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json() || [];
    } catch (err) {
        console.error("Fetch users error:", err);
        return [];
    }
}

async function fetchUserAllocatedNumbers(userId) {
    try {
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=number,range_name,last3&user_id=eq.${encodeURIComponent(userId)}`;
        const response = await fetch(url, { headers: { 'apikey': SUPABASE_API_KEY } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json() || [];
    } catch (err) {
        console.error("Fetch numbers error:", err);
        return [];
    }
}

async function fetchAllOtps() {
    try {
        const url = `${SUPABASE_URL}/rest/v1/otp_logs?select=*&order=date.desc&limit=2000`;
        const response = await fetch(url, { headers: { 'apikey': SUPABASE_API_KEY } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json() || [];
    } catch (err) {
        console.error("Fetch OTPs error:", err);
        return [];
    }
}

// FIXED: Proper date filtering using Date objects
function filterOtpsByUserAndDate(otps, phoneLast3s, startDateStr, endDateStr) {
    let filtered = otps.filter(otp => phoneLast3s.includes(otp.phone_last3));
    
    if (startDateStr && endDateStr) {
        // Create date objects for comparison
        const start = new Date(startDateStr);
        const end = new Date(endDateStr);
        end.setHours(23, 59, 59, 999); // Include entire end day
        
        filtered = filtered.filter(otp => {
            const otpDateStr = otp.date || otp.message_time?.slice(0, 10);
            if (!otpDateStr) return false;
            const otpDate = new Date(otpDateStr);
            return otpDate >= start && otpDate <= end;
        });
    }
    return filtered;
}

function updateUserData() {
    userPhoneLast3s = [];
    userNumberMap.clear();
    userNumbers.forEach(item => {
        if (item.number && item.last3) {
            userPhoneLast3s.push(item.last3);
            userNumberMap.set(item.last3, {
                number: item.number,
                range_name: item.range_name
            });
        }
    });
    userPhoneLast3s = [...new Set(userPhoneLast3s)];
}

function updateUserDropdown() {
    const select = document.getElementById('userSelect');
    select.innerHTML = '<option value="">-- Select a User --</option>';
    allUsers.forEach(user => {
        select.innerHTML += `<option value="${user.id}">${escapeHtml(user.username)} (${escapeHtml(user.email || 'No email')})</option>`;
    });
}

async function loadUserData() {
    if (!selectedUserId) {
        document.getElementById('otpRecordsList').innerHTML = `
            <div class="text-center py-12 text-gray-400">
                <i class="fas fa-user-circle text-4xl mb-3 opacity-40"></i><br/>
                Select a user to view OTPs
            </div>
        `;
        document.getElementById('totalOtps').textContent = '0';
        document.getElementById('totalEarnings').textContent = '$0.00';
        document.getElementById('uniqueNumbers').textContent = '0';
        return;
    }
    
    document.getElementById('otpRecordsList').innerHTML = `
        <div class="text-center py-12">
            <div class="loading-spinner mx-auto"></div>
            <p class="mt-3 text-gray-500">Loading user activities...</p>
        </div>
    `;
    
    const numbers = await fetchUserAllocatedNumbers(selectedUserId);
    userNumbers = numbers;
    updateUserData();
    
    const allOtps = await fetchAllOtps();
    userOtps = filterOtpsByUserAndDate(allOtps, userPhoneLast3s, startDate, endDate);
    
    const totalOtps = userOtps.length;
    const totalEarnings = totalOtps * 0.005;
    const uniqueNumbers = [...new Set(userOtps.map(otp => otp.phone_last3))].length;
    
    document.getElementById('totalOtps').textContent = totalOtps;
    document.getElementById('totalEarnings').textContent = `$${totalEarnings.toFixed(2)}`;
    document.getElementById('uniqueNumbers').textContent = uniqueNumbers;
    
    if (userOtps.length === 0) {
        document.getElementById('otpRecordsList').innerHTML = `
            <div class="text-center py-12 text-gray-400">
                <i class="fas fa-inbox text-4xl mb-3 opacity-40"></i><br/>
                📭 No OTPs found for this user in selected date range
            </div>
        `;
        return;
    }
    
    let html = '';
    
    for (const otp of userOtps) {
        const numberInfo = userNumberMap.get(otp.phone_last3);
        const phoneNumber = numberInfo?.number || otp.phone_last3;
        const maskedNumber = maskPhoneNumber(phoneNumber);
        const rangeName = numberInfo?.range_name || otp.country || 'Unknown';
        const timeStr = formatTime(otp.message_time);
        
        html += `
            <div class="otp-entry">
                <div class="flex justify-between items-start flex-wrap gap-2">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2 flex-wrap">
                            <span class="text-xs text-gray-400">#${otp.id || ''}</span>
                            <span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">📅 ${otp.date || 'N/A'}</span>
                            <span class="otp-badge text-xs">${escapeHtml(otp.otp)}</span>
                            <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">✓ Counted</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">
                            <div>
                                <span class="text-gray-500 text-xs">📞 Phone</span>
                                <p class="font-mono font-medium">${escapeHtml(maskedNumber)}</p>
                            </div>
                            <div>
                                <span class="text-gray-500 text-xs">🔐 Last3</span>
                                <p class="font-mono">${escapeHtml(otp.phone_last3)}</p>
                            </div>
                            <div>
                                <span class="text-gray-500 text-xs">✉️ Sender</span>
                                <p>${escapeHtml(otp.sender || otp.service || 'Unknown')}</p>
                            </div>
                            <div>
                                <span class="text-gray-500 text-xs">📌 Range</span>
                                <p><span class="inline-flex items-center gap-1"><i class="fas fa-tag text-purple-400 text-xs"></i> ${escapeHtml(rangeName)}</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-gray-400">${timeStr}</div>
                        <div class="text-emerald-600 font-semibold text-sm mt-1">+$0.005</div>
                    </div>
                </div>
            </div>
        `;
    }
    
    html += `
        <div class="bg-gradient-to-r from-purple-50 to-purple-100 rounded-xl p-3 text-center mt-4">
            <span class="font-semibold">Total: ${totalOtps} OTPs</span>
            <span class="mx-2">|</span>
            <span class="font-bold text-purple-700">$${totalEarnings.toFixed(2)}</span>
        </div>
    `;
    
    document.getElementById('otpRecordsList').innerHTML = html;
}

function saveSelectedUser() {
    localStorage.setItem('elite_admin_selected_user', selectedUserId);
    localStorage.setItem('elite_admin_start_date', startDate);
    localStorage.setItem('elite_admin_end_date', endDate);
}

function loadSavedState() {
    selectedUserId = localStorage.getItem('elite_admin_selected_user') || '';
    startDate = localStorage.getItem('elite_admin_start_date') || '';
    endDate = localStorage.getItem('elite_admin_end_date') || '';
    if (startDate) document.getElementById('startDate').value = startDate;
    if (endDate) document.getElementById('endDate').value = endDate;
    if (selectedUserId) document.getElementById('userSelect').value = selectedUserId;
}

function setupDropdown() {
    const menuBtn = document.getElementById('menuButton');
    const dropdown = document.getElementById('dropdownMenu');
    
    if (menuBtn) {
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('hidden-dropdown');
        });
    }
    
    document.addEventListener('click', function(e) {
        if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.add('hidden-dropdown');
        }
    });
}

function logout() {
    localStorage.removeItem('elite_session');
    localStorage.removeItem('elite_admin_selected_user');
    localStorage.removeItem('elite_admin_start_date');
    localStorage.removeItem('elite_admin_end_date');
    window.location.href = '../index.html';
}

async function initAdminDashboard() {
    const session = JSON.parse(localStorage.getItem('elite_session') || '{}');
    if (session.username) {
        document.getElementById('adminName').innerText = session.username;
    } else {
        window.location.href = '../index.html';
        return;
    }
    
    const end = new Date();
    const start = new Date();
    start.setDate(end.getDate() - 30);
    
    if (!document.getElementById('startDate').value) {
        document.getElementById('startDate').value = start.toISOString().slice(0, 10);
    }
    if (!document.getElementById('endDate').value) {
        document.getElementById('endDate').value = end.toISOString().slice(0, 10);
    }
    
    startDate = document.getElementById('startDate').value;
    endDate = document.getElementById('endDate').value;
    
    loadSavedState();
    
    allUsers = await fetchAllUsers();
    updateUserDropdown();
    
    if (selectedUserId) {
        document.getElementById('userSelect').value = selectedUserId;
        await loadUserData();
    }
    
    setupDropdown();
    
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    }
}

document.getElementById('userSelect').addEventListener('change', async (e) => {
    selectedUserId = e.target.value;
    saveSelectedUser();
    await loadUserData();
});

document.getElementById('applyFilterBtn').addEventListener('click', async () => {
    startDate = document.getElementById('startDate').value;
    endDate = document.getElementById('endDate').value;
    saveSelectedUser();
    await loadUserData();
});

document.addEventListener('DOMContentLoaded', async () => {
    await initAdminDashboard();
});
</script>
</body>
</html>
