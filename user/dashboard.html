<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ELITE Panel | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #7c3aed; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s; }
        .avatar-preview:hover { transform: scale(1.05); }
        .nav-link { transition: all 0.2s; display: block; width: 100%; text-align: left; }
        .nav-link:hover { background-color: #f5f3ff; color: #7c3aed; }
        .hidden-dropdown { display: none !important; }
        .dropdown-enter { animation: dropdownFade 0.2s ease; }
        @keyframes dropdownFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
<div id="dashboard" class="min-h-screen">
    <nav class="bg-white shadow-md border-b border-purple-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-purple-800 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fas fa-crown text-white text-sm"></i>
                </div>
                <div>
                    <span class="text-xl font-bold text-gray-800">ELITE<span class="text-purple-600">Panel</span></span>
                    <span class="ml-2 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">User</span>
                </div>
            </div>
            <div class="relative">
                <button id="menuBtn" class="bg-gray-100 hover:bg-purple-50 rounded-full px-3 py-2 transition cursor-pointer flex items-center gap-2">
                    <i class="fas fa-user-circle text-purple-600 text-lg"></i>
                    <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
                </button>
                <div id="dropdown" class="absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 hidden-dropdown z-50 overflow-hidden dropdown-enter">
                    <a href="#" data-page="dashboard" class="nav-link px-4 py-2.5 bg-purple-50 text-purple-700 font-medium"><i class="fas fa-user w-5 text-purple-500 mr-2"></i> Profile</a>
                    <a href="#" data-page="allocation" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-phone-alt w-5 text-purple-500 mr-2"></i> Allocation</a>
                    <a href="#" data-page="today_stat" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-chart-bar w-5 text-purple-500 mr-2"></i> Today's Stat</a>
                    <a href="#" data-page="today_otp" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-dollar-sign w-5 text-purple-500 mr-2"></i> Today's OTP</a>
                    <a href="#" data-page="past_records" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-history w-5 text-purple-500 mr-2"></i> Past Records</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="#" id="supportBtn" class="nav-link px-4 py-2.5 text-purple-600"><i class="fab fa-whatsapp w-5 text-purple-500 mr-2"></i> Contact Support</a>
                    <a href="#" id="logoutBtn" class="nav-link px-4 py-2.5 text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <div id="content" class="max-w-4xl mx-auto p-4"></div>
</div>

<script>
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';

let currentUser = null;
let allUserNumbers = [];
let allOtps = [];
let userLast3sAll = [];
let currentUserId = null;

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
function getLast3Digits(num) { return num.toString().replace(/\D/g, '').slice(-3); }
function formatTime(o) {
    if (o.message_time) return new Date(o.message_time).toLocaleTimeString();
    if (o.created_at) return new Date(o.created_at).toLocaleTimeString();
    return '-';
}

async function loadUserData(userId) {
    const userRes = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*&id=eq.${encodeURIComponent(userId)}`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    const users = await userRes.json();
    if (!users.length) throw new Error('User not found');
    currentUser = users[0];
    
    const allNumbersRes = await fetch(`${SUPABASE_URL}/rest/v1/allocated_numbers?select=*&user_id=eq.${currentUser.id}`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    allUserNumbers = await allNumbersRes.json();
    
    userLast3sAll = [...new Set(allUserNumbers.map(n => getLast3Digits(n.number)))];
    
    const otpRes = await fetch(`${SUPABASE_URL}/rest/v1/otp_logs?select=*&order=date.desc&limit=2000`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    const allOtpsRaw = await otpRes.json();
    allOtps = allOtpsRaw.filter(otp => userLast3sAll.includes(otp.phone_last3));
}

function displayProfile() {
    let total = allOtps.length;
    let earned = (total * 0.005).toFixed(2);
    let avatar = localStorage.getItem("avatar") || "";
    
    document.getElementById('content').innerHTML = `
    <div class="glass-card p-6 text-center fade-in">
        <input type="file" id="avatarInput" accept="image/*" class="hidden" onchange="uploadPic(event)">
        <div class="relative inline-block cursor-pointer" onclick="document.getElementById('avatarInput').click()">
            <img src="${avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.username) + '&background=7c3aed&color=fff&size=100'}" class="avatar-preview">
            <div class="absolute bottom-0 right-0 bg-purple-600 text-white p-1 rounded-full w-8 h-8 flex items-center justify-center shadow-md">
                <i class="fas fa-camera text-xs"></i>
            </div>
        </div>
        <h2 class="text-xl font-bold mt-4">${escapeHtml(currentUser.username)}</h2>
        <p class="text-gray-500 text-sm">${escapeHtml(currentUser.email || 'No email')}</p>
        <div class="mt-6 bg-gradient-to-r from-purple-50 to-purple-100 rounded-xl p-4">
            <p class="text-gray-600 text-sm">Total Lifetime Earnings</p>
            <h3 class="text-3xl font-bold text-purple-700">$${earned}</h3>
            <p class="text-xs text-gray-500 mt-1">${total} OTPs received</p>
        </div>
        <div class="mt-4 text-sm text-gray-500">
            <i class="fas fa-calendar-alt mr-1"></i> Member since: ${currentUser.created_at?.slice(0,10) || 'N/A'}
        </div>
    </div>`;
}

function uploadPic(e) {
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = () => {
        localStorage.setItem("avatar", reader.result);
        displayProfile();
    };
    reader.readAsDataURL(file);
}

function setupDropdown() {
    const menuBtn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('dropdown');
    if (menuBtn) {
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('hidden-dropdown');
        });
    }
    document.addEventListener('click', function(e) {
        if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.add('hidden-dropdown');
        }
    });
    
    // Setup navigation for dropdown links
    const navLinks = document.querySelectorAll('[data-page]');
    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = link.getAttribute('data-page');
            const userId = currentUser.id;
            if (page === 'dashboard') {
                displayProfile();
            } else {
                window.location.href = `${page}.html?id=${userId}`;
            }
            dropdown.classList.add('hidden-dropdown');
        });
    });
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    if (!userId) { window.location.href = '../index.html'; return; }
    currentUserId = userId;
    
    document.getElementById('content').innerHTML = `<div class="glass-card p-6"><div class="skeleton h-32 w-full mb-3"></div><div class="skeleton h-24 w-full mb-3"></div><div class="skeleton h-24 w-full"></div></div>`;
    
    await loadUserData(userId);
    displayProfile();
    setupDropdown();
    
    document.getElementById('logoutBtn').onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem('elite_session');
        window.location.href = '../index.html';
    };
    document.getElementById('supportBtn').onclick = (e) => {
        e.preventDefault();
        window.open('https://wa.me/2348113903584', '_blank');
    };
}

window.uploadPic = uploadPic;
init();
</script>
</body>
</html>
