<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ELITE Panel | Past Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1); }
        .otp-entry { background: white; border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; border: 1px solid #e9d5ff; transition: all 0.2s; }
        .otp-entry:hover { border-color: #7c3aed; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1); }
        .otp-badge { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-family: monospace; font-size: 0.9rem; }
        .btn-purple { background: linear-gradient(135deg, #7c3aed, #6d28d9); transition: all 0.2s; }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3); }
        .hidden-dropdown { display: none !important; }
        .nav-link { transition: all 0.2s; display: block; width: 100%; text-align: left; }
        .nav-link:hover { background-color: #f5f3ff; color: #7c3aed; }
        .dropdown-enter { animation: dropdownFade 0.2s ease; }
        @keyframes dropdownFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="min-h-screen">
    <nav class="bg-white shadow-md border-b border-purple-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="goToPage('dashboard.html')">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-purple-800 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fas fa-crown text-white text-sm"></i>
                </div>
                <div><span class="text-xl font-bold text-gray-800">ELITE<span class="text-purple-600">Panel</span></span>
                <span class="ml-2 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">User</span></div>
            </div>
            <div class="relative">
                <button id="menuBtn" class="bg-gray-100 hover:bg-purple-50 rounded-full px-3 py-2 transition cursor-pointer flex items-center gap-2">
                    <i class="fas fa-user-circle text-purple-600 text-lg"></i>
                    <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
                </button>
                <div id="dropdown" class="absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 hidden-dropdown z-50 overflow-hidden dropdown-enter">
                    <a href="dashboard.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-user w-5 text-purple-500 mr-2"></i> Profile</a>
                    <a href="allocation.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-phone-alt w-5 text-purple-500 mr-2"></i> Allocation</a>
                    <a href="today_stat.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-chart-bar w-5 text-purple-500 mr-2"></i> Today's Stat</a>
                    <a href="today_otp.html" class="nav-link px-4 py-2.5 text-gray-700"><i class="fas fa-dollar-sign w-5 text-purple-500 mr-2"></i> Today's OTP</a>
                    <a href="past_records.html" class="nav-link px-4 py-2.5 bg-purple-50 text-purple-700 font-medium"><i class="fas fa-history w-5 text-purple-500 mr-2"></i> Past Records</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="#" id="supportBtn" class="nav-link px-4 py-2.5 text-purple-600"><i class="fab fa-whatsapp w-5 text-purple-500 mr-2"></i> Contact Support</a>
                    <a href="#" id="logoutBtn" class="nav-link px-4 py-2.5 text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <div id="content" class="max-w-4xl mx-auto p-4"></div>
</div>

<script>
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';

let currentUser = null;
let allUserNumbers = [];
let allOtps = [];

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
function getLast3Digits(num) { return num.toString().replace(/\D/g, '').slice(-3); }
function formatTime(o) {
    if (o.message_time) return new Date(o.message_time).toLocaleTimeString();
    if (o.created_at) return new Date(o.created_at).toLocaleTimeString();
    return '-';
}

async function loadData(userId) {
    const userRes = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*&id=eq.${encodeURIComponent(userId)}`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    const users = await userRes.json();
    if (!users.length) throw new Error('User not found');
    currentUser = users[0];
    
    const allNumbersRes = await fetch(`${SUPABASE_URL}/rest/v1/allocated_numbers?select=*&user_id=eq.${currentUser.id}`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    allUserNumbers = await allNumbersRes.json();
    const userLast3s = [...new Set(allUserNumbers.map(n => getLast3Digits(n.number)))];
    
    const otpRes = await fetch(`${SUPABASE_URL}/rest/v1/otp_logs?select=*&order=date.desc&limit=2000`, {
        headers: { 'apikey': SUPABASE_API_KEY }
    });
    const allOtpsRaw = await otpRes.json();
    allOtps = allOtpsRaw.filter(otp => userLast3s.includes(otp.phone_last3));
}

function displayPastRecords() {
    const today = new Date();
    const weekAgo = new Date();
    weekAgo.setDate(today.getDate() - 7);
    document.getElementById('content').innerHTML = `<div class="glass-card p-6 fade-in"><h2 class="text-xl font-bold mb-4">📋 Past OTP Records</h2><div class="grid grid-cols-2 gap-3 mb-4"><input type="date" id="pastStartDate" class="border border-purple-200 rounded-xl px-4 py-2 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none" value="${weekAgo.toISOString().slice(0,10)}"><input type="date" id="pastEndDate" class="border border-purple-200 rounded-xl px-4 py-2 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none" value="${today.toISOString().slice(0,10)}"></div><button onclick="filterPastRecords()" class="btn-purple w-full text-white py-2 rounded-xl font-semibold shadow-md mb-4"><i class="fas fa-search mr-2"></i> Filter</button><div id="pastBox" class="space-y-3"></div></div>`;
}

function filterPastRecords() {
    let startDate = document.getElementById('pastStartDate').value;
    let endDate = document.getElementById('pastEndDate').value;
    let html = "";
    let total = 0;
    
    if (!startDate || !endDate) {
        document.getElementById('pastBox').innerHTML = '<p class="text-center text-red-400 py-4">⚠️ Please select both start and end dates</p>';
        return;
    }
    
    const start = new Date(startDate);
    const end = new Date(endDate);
    end.setHours(23, 59, 59, 999);
    
    const sortedOtps = [...allOtps].sort((a, b) => {
        const dateA = new Date(a.date || a.message_time);
        const dateB = new Date(b.date || b.message_time);
        return dateB - dateA;
    });
    
    for (const otp of sortedOtps) {
        const otpDateStr = otp.date || otp.message_time?.slice(0, 10);
        if (!otpDateStr) continue;
        const otpDate = new Date(otpDateStr);
        if (otpDate >= start && otpDate <= end) {
            let match = allUserNumbers.find(n => getLast3Digits(n.number) === otp.phone_last3);
            let phoneDisplay = match ? match.number : '***' + otp.phone_last3;
            let rangeDisplay = otp.range || match?.range_name || '-';
            total++;
            html += `<div class="otp-entry"><div class="flex justify-between items-start flex-wrap gap-2"><div class="flex-1"><div class="text-xs text-gray-400 mb-1">📅 ${otpDateStr}</div><div class="flex items-center gap-2 mb-2 flex-wrap"><span class="text-sm font-medium text-gray-500">🌍 ${escapeHtml(otp.country || '-')}</span><span class="otp-badge text-xs">${escapeHtml(otp.otp)}</span></div><div class="text-sm"><div>📞 ${escapeHtml(phoneDisplay)}</div><div class="text-gray-500 text-xs mt-1">📩 ${escapeHtml(otp.sender || '-')} | 📌 ${escapeHtml(rangeDisplay)}</div></div></div><div class="text-xs text-gray-400">${formatTime(otp)}</div></div><div class="text-right text-emerald-600 text-xs font-semibold mt-2">+$0.005</div></div>`;
        }
    }
    
    let earn = (total * 0.005).toFixed(2);
    if (!html) {
        document.getElementById('pastBox').innerHTML = '<p class="text-center text-gray-400 py-4">📭 No OTPs found in this date range</p>';
        return;
    }
    document.getElementById('pastBox').innerHTML = html + `<div class="bg-gradient-to-r from-purple-50 to-purple-100 rounded-xl p-3 text-center mt-4"><span class="font-semibold">📊 Total: ${total} OTPs</span><span class="mx-2">|</span><span class="font-bold text-purple-700">💰 $${earn}</span></div>`;
}

function setupDropdown() {
    const menuBtn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('dropdown');
    if (menuBtn) {
        menuBtn.addEventListener('click', function(e) { e.stopPropagation(); dropdown.classList.toggle('hidden-dropdown'); });
    }
    document.addEventListener('click', function(e) {
        if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden-dropdown');
    });
}

function goToPage(page) {
    const userId = new URLSearchParams(window.location.search).get('id');
    window.location.href = `${page}?id=${userId}`;
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    if (!userId) { window.location.href = '../index.html'; return; }
    document.getElementById('content').innerHTML = `<div class="glass-card p-6"><div class="skeleton h-32 w-full mb-3"></div></div>`;
    await loadData(userId);
    displayPastRecords();
    setupDropdown();
    document.getElementById('logoutBtn').onclick = (e) => { e.preventDefault(); localStorage.removeItem('elite_session'); window.location.href = '../index.html'; };
    document.getElementById('supportBtn').onclick = (e) => { e.preventDefault(); window.open('https://wa.me/2348113903584', '_blank'); };
}

window.filterPastRecords = filterPastRecords;
window.goToPage = goToPage;
init();
</script>
</body>
</html>
